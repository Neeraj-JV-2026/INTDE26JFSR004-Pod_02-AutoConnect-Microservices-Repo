server.port=8081

spring.application.name=service-management-service

# ─── Database ────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/service_parts_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ─── Disable Spring Boot default security login ──────────────
spring.security.user.name=disabled
spring.security.user.password=disabled

# ─── JWT ─────────────────────────────────────────────────────
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

# ─── Eureka Client ───────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# ─── Feign Clients (used before Eureka, kept as fallback) ────
crm.service.url=http://localhost:8081
iam.service.url=http://localhost:8080
inventory.service.url=http://localhost:8082
finance.service.url=http://localhost:8083

# ─── Feign timeouts ──────────────────────────────────────────
spring.cloud.openfeign.client.config.default.connectTimeout=3000
spring.cloud.openfeign.client.config.default.readTimeout=3000

# ─── Logging ─────────────────────────────────────────────────
logging.level.com.cognizant=DEBUG
logging.level.org.springframework.security=INFO

# ─── Springdoc / Swagger UI ──────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.packages-to-scan=com.cognizant.serviceparts.controller

# Expose actuator endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.security.enabled=false