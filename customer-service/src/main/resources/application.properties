spring.application.name=customer-service
server.port=8083

# ─── Database ────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/customer_service_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
# ddl-auto=none  →  schema managed by schema.sql
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── SQL Initialisation ───────────────────────────────────────────────────────
# SQL init disabled - application should not auto-run schema/data SQL on startup
spring.sql.init.mode=never

# ─── JWT / User-Service ───────────────────────────────────────────────────────
app.jwt.secret=3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007
app.user-service.url=http://localhost:8082/api/auth/validate

# ─── Springdoc / Swagger UI ───────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ─── Eureka Client ───────────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
