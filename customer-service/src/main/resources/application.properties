spring.application.name=customer-service
server.port=8083

# ─── H2 In-Memory Database ────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:autoconnect_crm_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console  →  http://localhost:8083/h2-console
# JDBC URL: jdbc:h2:mem:autoconnect_crm_db  |  User: sa  |  Password: (empty)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
# ddl-auto=none  →  schema managed by schema.sql
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── SQL Initialisation ───────────────────────────────────────────────────────
# Run src/main/resources/schema.sql then data.sql on every startup
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# ─── JWT / User-Service ───────────────────────────────────────────────────────
app.jwt.secret=3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007
app.user-service.url=http://localhost:8082/api/auth/validate

# ─── Springdoc / Swagger UI ───────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ─── Eureka Client ───────────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
