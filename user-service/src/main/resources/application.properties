spring.application.name=user-service
# ===============================
# Application Name & Server
# ===============================
server.port=8082

# ===============================
# MySQL Database Configuration
# ===============================
# ADDED: allowPublicKeyRetrieval=true (Fixes the connection exception)
spring.datasource.url=jdbc:mysql://localhost:3306/autoconnect_db2?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate Settings
# ===============================
# NOTE: Removed spring.jpa.database-platform as Hibernate 7 auto-detects MySQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true
spring.jpa.open-in-view=false

# ===============================
# JWT Configuration
# ===============================
app.jwt.secret=3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007
app.jwt.expiration-ms=86400000

# ===============================
# Eureka Client Configuration
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
