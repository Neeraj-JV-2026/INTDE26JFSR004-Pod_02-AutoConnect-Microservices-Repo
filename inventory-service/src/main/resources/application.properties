# ─────────────────────────────────────────────
# Application
# ─────────────────────────────────────────────
spring.application.name=inventory-service
server.port=8085

# ─────────────────────────────────────────────
# Database
# ─────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/inventory_service_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# ─────────────────────────────────────────────
# JPA / Hibernate
# ─────────────────────────────────────────────
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=never
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─────────────────────────────────────────────
# Eureka Service Discovery
# ─────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ─────────────────────────────────────────────
# External Service URLs (for Feign Clients)
# ─────────────────────────────────────────────
app.user-service.url=http://localhost:8082
