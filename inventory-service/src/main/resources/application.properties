# ─────────────────────────────────────────────
# Application
# ─────────────────────────────────────────────
spring.application.name=inventory-service
server.port=8085

# ─────────────────────────────────────────────
# H2 In-Memory Database
# ─────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:inventorydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ─────────────────────────────────────────────
# JPA / Hibernate
# ─────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─────────────────────────────────────────────
# H2 Console (available at http://localhost:8085/h2-console)
# JDBC URL to enter in console: jdbc:h2:mem:inventorydb
# ─────────────────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ─────────────────────────────────────────────
# Eureka Service Discovery
# ─────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ─────────────────────────────────────────────
# External Service URLs (for Feign Clients)
# ─────────────────────────────────────────────
app.user-service.url=http://localhost:8082
